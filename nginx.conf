server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files, fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # HTML and CSS: always revalidate — Cloudflare will re-fetch on every deploy
    location ~* \.(html|css)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        etag on;
    }

    # Images and fonts: cache aggressively (they rarely change)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
