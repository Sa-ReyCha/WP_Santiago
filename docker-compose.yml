services:
  web:
    build: .
    restart: unless-stopped
    # No ports exposed to the host — cloudflared routes inbound traffic

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - web
    restart: unless-stopped
